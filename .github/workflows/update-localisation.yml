name: Update Localisation

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.STATS_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Update localisation assets
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_API_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}
        run: python scripts/update_localisation.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            TRANSLATIONS.md \
            docs/translation-progress.svg \
            app/src/main/java/com/cemcakmak/hydrotracker/utils/AppLocale.kt \
            app/src/main/res/xml/locales_config.xml

          if git diff --cached --quiet; then
            echo "No localisation changes to commit"
            exit 0
          fi

          git commit -m "Update localisation progress and supported locales [skip ci]"
          git push
